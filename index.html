<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frogville Realty</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #EAE6BD;">

    <header class="main-header">
        <nav class="navbar">
            <a href="#" class="nav-link">🏠 Home</a>
            <a href="#" class="nav-link">📞 Contact</a>
            <a href="#" class="nav-link">🐸 Despre</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Prima ta locuință cu o broască</h1>
        </section>

        <section class="form-section">
            <form action="#" class="frog-form">
                <div class="form-grid">
                    <div class="input-group">
                            <img src="broasca.png" alt="icon" class="frog-icon-image">
                        <input type="text" placeholder="Numele tău aici..." required>
                    </div>
                    <div class="input-group">
                        <img src="broasca.png" alt="icon" class="frog-icon-image">
                        <input type="text" placeholder="Prenumele tău aici..." required>
                    </div>
                    <div class="input-group">
                        <img src="broasca.png" alt="icon" class="frog-icon-image">
                        <input type="number" placeholder="Câte camere vrei..." required>
                    </div>
                    <div class="input-group">
                        <img src="broasca.png" alt="icon" class="frog-icon-image">
                        <input type="text" placeholder="Județul dorit..." required>
                    </div>
                    <div class="input-group">
                        <img src="broasca.png" alt="icon" class="frog-icon-image">
                        <input type="text" placeholder="Orașul dorit..." required>
                    </div>
                    <div class="input-group">
                        <img src="broasca.png" alt="icon" class="frog-icon-image">
                        <input type="text" placeholder="Sectorul aici...">
                    </div>
                    <div class="input-group">
                        <img src="broasca.png" alt="icon" class="frog-icon-image">
                        <input type="tel" placeholder="Nr de telefon..." required>
                    </div>
                    <div class="input-group">
                        <img src="broasca.png" alt="icon" class="frog-icon-image">
                        <textarea placeholder="Alte detalii..." rows="3"></textarea>
                    </div>
                </div>
                
                <button type="submit" class="submit-btn">Submit</button>
            </form>
        </section>

        <hr>

        <section class="gallery">
            <div class="image-card">
                <img src="broasca cu casa.png" alt="Agent Frog">
            </div>
            <div class="image-card">
                <img src="casa pe lac.png" alt="Casa Frog">
            </div>
            <div class="image-card">
                <img src="vila.png" alt="Vila Frog">
            </div>
        </section>

        <hr>

        <section class="house-types">
            <h2>Tipuri de locuințe:</h2>
            <ul>
                <li>Pe lac</li>
                <li>În mlaștină</li>
                <li>În râu de munte</li>
                <li>La muzeu</li>
                <li>Într-o baltă de pescuit</li>
            </ul>
        </section>
    </main>

</body>
</html>
